name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
      placeholder: I want to be able to...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should this work? Include commands, behavior, or UI if applicable.
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: What part of Omni does this affect?
      options:
        - Core framework
        - CLI tool
        - Addon API
        - Built-in addon (moderation, tickets, etc.)
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought about?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, links, or anything else relevant.
